name: PR title lint

# Vérifie que le titre de la PR suit la convention utilisée pour générer
# le CHANGELOG (voir .github/scripts/update_changelog.py). Ce workflow
# tourne sur 'pull_request' (pas 'pull_request_target') : il ne fait
# qu'un contrôle en lecture seule, donc pas besoin de permissions
# d'écriture ni de secrets, même pour les PR venant de forks.

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "PR Dependabot, format de titre géré séparément."
            exit 0
          fi

          if echo "$PR_TITLE" | grep -Eq '^(feat|fix|deps|chore|docs|refactor|test|ci|perf|style|build)(\([a-zA-Z0-9_-]+\))?!?: .+'; then
            echo "Titre de PR valide : $PR_TITLE"
          else
            echo "::error::Le titre de la PR doit suivre la convention 'type(scope): description'."
            echo "::error::Types autorisés : feat, fix, deps, chore, docs, refactor, test, ci, perf, style, build."
            echo "::error::Exemple : 'fix(inclusion): corrige le matching des boutons Profalux'"
            exit 1
          fi